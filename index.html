<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
  import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

  const firebaseConfig = {
    databaseURL: "https://fortnite-spirits-default-rtdb.europe-west1.firebasedatabase.app/"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const dataRef = ref(db, 'grille');

  // Quand la base change (quelqu'un d'autre modifie), on met à jour la page
  onValue(dataRef, (snapshot) => {
    const data = snapshot.val();
    if (data) {
      allSelects.forEach((sel, i) => {
        if (data[i] !== undefined) sel.value = data[i];
      });
    }
  });

  // Quand toi tu changes quelque chose, on envoie à la base
  function updateFirebase() {
    const data = allSelects.map(s => s.value);
    set(dataRef, data);
  }

  // Ajoute l'écouteur sur chaque menu déroulant
  allSelects.forEach(sel => sel.addEventListener('change', updateFirebase));
</script>
